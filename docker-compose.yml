# Local development services for AI CV Optimizer.
# Postgres ships with pgvector preinstalled. Published on host port 55432 (bound to
# loopback) to avoid clashing with any other Postgres or SSH tunnel on common ports.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-cv-optimizer-postgres
    environment:
      POSTGRES_DB: ai_cv_optimizer
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_cv_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
